<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan RT - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- SETUP API URL (PENTING!) -->
    <script>
        /**
         * PENTING:
         * 1. Pastikan GAS di-deploy sebagai "Web App".
         * 2. Execute as: "Me".
         * 3. Who has access: "Anyone".
         * 4. Gunakan URL dari deployment terbaru.
         * 5. PASTIKAN NAMA SHEET DI SPREADSHEET ADALAH: "Warga", "Dana_Masuk", dan "Dana_Keluar"
         */
        const API_URL = "https://script.google.com/macros/s/AKfycbwrGUs89FtPJI9A74UEsFlUXBE3gjdC-k_pqAad6FKZbo1qqRPjYoqYjdmO_9NN93po/exec
";
        let APP_PASS = "";
    </script>

    <!-- UI Login -->
    <div id="loginPage" class="page active flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200 text-center">
            <h1 class="text-2xl font-bold mb-6 text-blue-700">Keuangan RT (Remote)</h1>
            <input type="password" id="passInput" placeholder="Masukkan Password Aplikasi" class="w-full px-4 py-2 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Masuk</button>
            <p id="loginErr" class="text-red-500 mt-2 text-sm hidden"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="page min-h-screen">
        <nav class="bg-blue-700 text-white shadow-md p-4 flex justify-between items-center">
            <span class="font-bold text-lg">Dashboard RT Digital</span>
            <button onclick="location.reload()" class="bg-blue-800 px-3 py-1 rounded text-xs hover:bg-red-600 transition">Logout</button>
        </nav>
        
        <div class="max-w-6xl mx-auto p-4">
            <!-- Navigasi Menu -->
            <div class="flex space-x-2 mb-6 overflow-x-auto pb-2">
                <button onclick="showPage('dashboard')" class="bg-white border border-blue-200 px-6 py-2 rounded-lg shadow-sm hover:bg-blue-50 transition min-w-[100px]">Dashboard</button>
                <button onclick="showPage('warga')" class="bg-white border border-blue-200 px-6 py-2 rounded-lg shadow-sm hover:bg-blue-50 transition min-w-[100px]">Data Warga</button>
                <button onclick="showPage('add-warga')" class="bg-white border border-blue-200 px-6 py-2 rounded-lg shadow-sm hover:bg-blue-50 transition min-w-[100px] text-blue-600">+ Warga</button>
                <button onclick="showPage('masuk')" class="bg-white border border-blue-200 px-6 py-2 rounded-lg shadow-sm hover:bg-blue-50 transition min-w-[100px]">Dana Masuk</button>
                <button onclick="showPage('keluar')" class="bg-white border border-blue-200 px-6 py-2 rounded-lg shadow-sm hover:bg-blue-50 transition min-w-[100px]">Dana Keluar</button>
            </div>
            
            <!-- Dashboard Content -->
            <div id="page-dashboard" class="subpage active">
                 <h2 class="text-xl font-bold mb-4 text-gray-800">Ringkasan Kas</h2>
                 <div id="stat-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                     <div class="bg-green-50 p-6 rounded-xl border border-green-200 shadow-sm">
                        <p class="text-green-600 text-xs font-bold uppercase">Total Masuk</p>
                        <p class="text-2xl font-bold text-green-800">Rp <span id="stat-masuk">0</span></p>
                     </div>
                     <div class="bg-red-50 p-6 rounded-xl border border-red-200 shadow-sm">
                        <p class="text-red-600 text-xs font-bold uppercase">Total Keluar</p>
                        <p class="text-2xl font-bold text-red-800">Rp <span id="stat-keluar">0</span></p>
                     </div>
                     <div class="bg-blue-50 p-6 rounded-xl border border-blue-200 shadow-sm">
                        <p class="text-blue-600 text-xs font-bold uppercase">Saldo Saat Ini</p>
                        <p class="text-2xl font-bold text-blue-800">Rp <span id="stat-saldo">0</span></p>
                     </div>
                 </div>
            </div>

            <!-- Table Warga -->
            <div id="page-warga" class="subpage hidden">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Daftar Warga</h2>
                <div class="bg-white rounded-xl shadow border overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b">
                                <th class="p-4 text-sm font-bold text-gray-600 uppercase">Kode</th>
                                <th class="p-4 text-sm font-bold text-gray-600 uppercase">Nama Warga</th>
                                <th class="p-4 text-sm font-bold text-gray-600 uppercase">No Rumah</th>
                            </tr>
                        </thead>
                        <tbody id="table-warga-body" class="divide-y divide-gray-100">
                            <!-- Data dimuat di sini -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Input Warga Baru -->
            <div id="page-add-warga" class="subpage hidden">
                <h2 class="text-xl font-bold mb-4 text-blue-700">Tambah Warga Baru</h2>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm max-w-md">
                    <form id="formWarga" onsubmit="handleFormSubmit(event, 'addWarga')">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Kode Warga</label>
                                <input type="text" name="Kode" placeholder="W001" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">Nama Warga</label>
                                <input type="text" name="Nama_Warga" placeholder="Nama Lengkap" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">RT</label>
                                <input type="text" name="RT" placeholder="001" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-600 mb-1">No Rumah</label>
                                <input type="text" name="No_Rumah" placeholder="A-10" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Status</label>
                            <select name="Status" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="Tetap">Tetap</option>
                                <option value="Kontrak">Kontrak</option>
                            </select>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Alamat</label>
                            <textarea name="Alamat" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Simpan Data Warga</button>
                    </form>
                </div>
            </div>

            <!-- Menu Dana Masuk -->
            <div id="page-masuk" class="subpage hidden">
                <h2 class="text-xl font-bold mb-4 text-green-700">Input Dana Masuk</h2>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm max-w-md">
                    <form id="formMasuk" onsubmit="handleFormSubmit(event, 'addDanaMasuk')">
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Pilih Warga</label>
                            <select id="selectWarga" name="kodeWarga" class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                                <option value="-">--- Umum / Kas ---</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Keterangan</label>
                            <input type="text" name="keterangan" placeholder="Contoh: Iuran Bulanan" required class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Jumlah (Rp)</label>
                            <input type="number" name="jumlah" placeholder="0" required class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 transition">Simpan Dana Masuk</button>
                    </form>
                </div>
            </div>

            <!-- Menu Dana Keluar -->
            <div id="page-keluar" class="subpage hidden">
                <h2 class="text-xl font-bold mb-4 text-red-700">Input Dana Keluar</h2>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm max-w-md">
                    <form id="formKeluar" onsubmit="handleFormSubmit(event, 'addDanaKeluar')">
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Keterangan / Keperluan</label>
                            <input type="text" name="keterangan" placeholder="Contoh: Perbaikan Lampu" required class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-gray-600 mb-1">Jumlah Pengeluaran (Rp)</label>
                            <input type="number" name="jumlah" placeholder="0" required class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold hover:bg-red-700 transition">Simpan Dana Keluar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 bg-white bg-opacity-70 hidden flex flex-col items-center justify-center z-50">
        <div class="loader mb-2"></div>
        <p class="text-blue-600 font-medium animate-pulse">Memproses...</p>
    </div>

    <script>
        async function requestData(action, data = {}) {
            showLoading(true);
            try {
                const payload = { 
                    action: action, 
                    password: APP_PASS, 
                    data: data 
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Gagal terhubung ke server");

                const result = await response.json();
                showLoading(false);

                if (!result.success) {
                    alert("Error: " + (result.message || "Terjadi kesalahan"));
                    return null;
                }

                return result;
            } catch (error) {
                console.error("API Error:", error);
                showLoading(false);
                alert("Kesalahan Jaringan. Pastikan URL API sudah benar.");
                return null;
            }
        }

        async function handleLogin() {
            const passInput = document.getElementById('passInput');
            APP_PASS = passInput.value;
            
            if (!APP_PASS) {
                alert("Masukkan password!");
                return;
            }

            const res = await requestData('getSummary');
            if (res && res.success) {
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('mainApp').classList.add('active');
                updateUI(res.data);
                loadWarga();
            }
        }

        async function loadWarga() {
            const res = await requestData('getWarga');
            if (res && res.success) {
                const body = document.getElementById('table-warga-body');
                const select = document.getElementById('selectWarga');
                
                body.innerHTML = '';
                select.innerHTML = '<option value="-">--- Umum / Kas ---</option>';

                if (res.data.length === 0) {
                    body.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-400 italic">Belum ada data warga</td></tr>';
                } else {
                    res.data.forEach(w => {
                        body.innerHTML += `
                            <tr class="hover:bg-blue-50 transition">
                                <td class="p-4 text-sm text-gray-600 font-mono font-bold">${w.Kode || '-'}</td>
                                <td class="p-4 text-sm text-gray-800 font-medium">${w.Nama_Warga || '-'}</td>
                                <td class="p-4 text-sm text-gray-500">${w.No_Rumah || '-'}</td>
                            </tr>
                        `;
                        select.innerHTML += `<option value="${w.Kode}">${w.Nama_Warga} (${w.Kode})</option>`;
                    });
                }
            }
        }

        async function handleFormSubmit(event, action) {
            event.preventDefault();
            const formData = Object.fromEntries(new FormData(event.target));
            
            const res = await requestData(action, formData);
            if (res && res.success) {
                alert(res.data || "Data berhasil disimpan!");
                event.target.reset();
                
                // Refresh data warga dan dashboard
                if (action === 'addWarga') {
                    await loadWarga();
                } else {
                    const stats = await requestData('getSummary');
                    if (stats) updateUI(stats.data);
                }
                
                showPage('dashboard');
            }
        }

        function updateUI(stats) {
            if (!stats) return;
            document.getElementById('stat-masuk').innerText = (stats.masuk || 0).toLocaleString('id-ID');
            document.getElementById('stat-keluar').innerText = (stats.keluar || 0).toLocaleString('id-ID');
            document.getElementById('stat-saldo').innerText = (stats.saldo || 0).toLocaleString('id-ID');
        }

        function showPage(id) {
            document.querySelectorAll('.subpage').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }

        function showLoading(s) { 
            document.getElementById('loader').classList.toggle('hidden', !s); 
        }
    </script>
</body>
</html>
